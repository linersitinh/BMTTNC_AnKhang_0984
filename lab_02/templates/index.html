<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Cipher Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(-45deg,#1d2b64,#f8cdda,#43cea2,#185a9d);
    background-size:400% 400%;
    animation:bgmove 10s infinite;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
}

@keyframes bgmove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.card-box{
width:650px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.result-box{
margin-top:15px;
padding:10px;
background:#e9f7ef;
border-radius:8px;
font-weight:600;
}

</style>

</head>

<body>

<div class="card-box">

<h3 class="text-center mb-4">
Cipher Encryption Tool
</h3>

<form id="cipherForm">

<div class="mb-3">

<label>Cipher</label>

<select class="form-select" id="cipher">

<option value="caesar">Caesar</option>
<option value="vigenere">Vigenere</option>

</select>

</div>


<div class="mb-3">

<label>Text</label>

<input type="text" id="text" class="form-control" placeholder="Enter text">

</div>


<div class="mb-3">

<label>Key</label>

<input type="text" id="key" class="form-control" placeholder="Enter key">

</div>


<div class="d-flex gap-2">

<button type="button" class="btn btn-primary w-50" onclick="encrypt()">Encrypt</button>

<button type="button" class="btn btn-danger w-50" onclick="decrypt()">Decrypt</button>

</div>

</form>

<div id="alert"></div>

<div class="result-box" id="result">
Result will appear here
</div>

</div>

<script>

function showAlert(msg){

document.getElementById("alert").innerHTML =
`<div class="alert alert-danger mt-3">${msg}</div>`

}

function encrypt(){

let cipher=document.getElementById("cipher").value
let text=document.getElementById("text").value
let key=document.getElementById("key").value

if(text==""){
showAlert("Text cannot be empty")
return
}

if(cipher=="caesar" && isNaN(key)){
showAlert("Caesar key must be a NUMBER")
return
}

fetch(`/api/${cipher}/encrypt`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
plain_text:text,
key:key
})

})

.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerText=JSON.stringify(data)
})

}

function decrypt(){

let cipher=document.getElementById("cipher").value
let text=document.getElementById("text").value
let key=document.getElementById("key").value

if(cipher=="caesar" && isNaN(key)){
showAlert("Caesar key must be a NUMBER")
return
}

fetch(`/api/${cipher}/decrypt`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
cipher_text:text,
key:key
})

})

.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerText=JSON.stringify(data)
})

}

</script>

</body>
</html>
